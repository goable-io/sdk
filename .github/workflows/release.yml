name: Release

on:
  push:
    branches: [main]
    # Only cut a release when something that affects the PUBLISHED package
    # actually changes. The tarball ships `dist` (built from `src`), so releases
    # are scoped to source + the package manifest + build config. Merges that
    # touch ONLY workflows, `openapi.json` (formatting — the generated types live
    # under `src` and are covered above), tests, or docs (README/CHANGELOG/
    # CONTRIBUTING) no longer trigger a spurious patch publish. To force a
    # release without a code change, bump the version in `package.json`.
    paths:
      - "src/**"
      - "package.json"
      - "tsconfig.json"

# Provenance requires id-token: write; tagging/release requires contents: write.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Enable corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # Version resolution policy:
      #   - package.json > npm latest → publish package.json's version exactly
      #     (manual major/minor bump path).
      #   - package.json == npm latest → auto-bump the patch component
      #     (routine merge path).
      #   - package.json < npm latest → fail loudly (someone forgot to bump).
      - name: Resolve next version
        id: bump
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./package.json').name")
          REPO_VERSION=$(node -p "require('./package.json').version")
          NPM_LATEST=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")

          CMP=$(REPO_VERSION="$REPO_VERSION" NPM_LATEST="$NPM_LATEST" node -e "
            const v = (s) => s.split('.').map(Number);
            const a = v(process.env.REPO_VERSION);
            const b = v(process.env.NPM_LATEST);
            for (let i = 0; i < 3; i++) {
              if (a[i] > b[i]) { console.log('gt'); process.exit(0); }
              if (a[i] < b[i]) { console.log('lt'); process.exit(0); }
            }
            console.log('eq');
          ")

          echo "package.json: $REPO_VERSION"
          echo "npm latest:   $NPM_LATEST"
          echo "comparison:   $CMP"

          case "$CMP" in
            gt)
              NEXT="$REPO_VERSION"
              echo "Using package.json version (manual bump): $NEXT"
              ;;
            eq)
              MAJOR=$(echo "$NPM_LATEST" | cut -d. -f1)
              MINOR=$(echo "$NPM_LATEST" | cut -d. -f2)
              PATCH=$(echo "$NPM_LATEST" | cut -d. -f3)
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "Auto-bumping patch: $NEXT"
              npm version "$NEXT" --no-git-tag-version --allow-same-version
              ;;
            lt)
              echo "::error::package.json ($REPO_VERSION) is BEHIND npm latest ($NPM_LATEST). Manual intervention required." >&2
              exit 1
              ;;
            *)
              echo "::error::Could not compare versions" >&2
              exit 1
              ;;
          esac

          echo "version=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "version_plain=${NEXT}" >> "$GITHUB_OUTPUT"

      # Leak check: print exactly what would ship before publishing.
      - name: Pack dry-run (leak check)
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag-only push (no commit back to main). package.json on main stays
      # at its declared version; consumers read the real version from npm.
      - name: Create and push tag
        env:
          TAG: ${{ steps.bump.outputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
